apiVersion: v2
name: data-platform
description: Production-ready data engineering platform with Kafka streaming, Flink processing, and Airflow orchestration
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - kafka
  - flink
  - airflow
  - data-engineering
  - streaming

maintainers:
  - name: Data Engineering Team
    email: data-engineering@example.com

dependencies:
  - name: kafka
    version: "32.4.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: kafka.enabled

  - name: airflow
    version: "1.19.0"
    repository: "https://airflow.apache.org"
    condition: airflow.enabled

  - name: flink-kubernetes-operator
    version: "1.9.0"
    repository: "https://archive.apache.org/dist/flink/flink-kubernetes-operator-1.9.0/"
    condition: flinkOperator.enabled

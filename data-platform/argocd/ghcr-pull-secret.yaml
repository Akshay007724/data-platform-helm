# =============================================================================
# GHCR image pull secret for Kubernetes
#
# Do NOT commit a filled-in version of this file.
# Apply it manually once per cluster:
#
#   kubectl create namespace data-platform --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --namespace data-platform \
#     --docker-server=ghcr.io \
#     --docker-username=<github-username-or-org> \
#     --docker-password=<github-pat-with-read:packages> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The PAT needs only the `read:packages` scope.
# For public GHCR images this secret is not required.
# =============================================================================
#
# This file is intentionally left as documentation only.
# The secret is referenced in argocd/application.yaml via:
#   global.imagePullSecrets[0].name = ghcr-pull-secret

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: data-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Notify on sync failures (requires ArgoCD Notifications add-on)
    notifications.argoproj.io/subscribe.on-sync-failed.slack: deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-platform

  source:
    repoURL: https://github.com/akshay007724/data-platform.git
    targetRevision: master
    path: .   # Helm chart is at the repo root

    helm:
      releaseName: data-platform
      valueFiles:
        - values.yaml          # base config — edited by humans
        - values-images.yaml   # image tags — written by CI automatically
      # Pass the GHCR image pull secret so K8s can pull private images
      parameters:
        - name: global.imagePullSecrets[0].name
          value: ghcr-pull-secret

  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from the chart
      selfHeal: true   # revert manual kubectl edits automatically
    syncOptions:
      - CreateNamespace=true      # create data-platform ns if absent
      - PrunePropagationPolicy=foreground
      - PruneLast=true            # delete old resources after new ones are healthy
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # Health check overrides for CRDs ArgoCD doesn't know natively
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields

name: document-processor

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths:
      - "apps/document-processor/**"
      - ".github/workflows/document-processor.yml"
  pull_request:
    branches: [master]
    paths:
      - "apps/document-processor/**"
      - ".github/workflows/document-processor.yml"

defaults:
  run:
    working-directory: apps/document-processor

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/document-processor/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v

  build-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      short-sha: ${{ steps.short-sha.outputs.sha }}
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/data-platform/document-processor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/document-processor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-image-tag:
    name: Update image tag (GitOps)
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers downstream workflows (GITHUB_TOKEN push does not)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docker-compose.prod.yml image tag
        run: |
          SHORT_SHA=${{ needs.build-push.outputs.short-sha }}
          IMAGE="ghcr.io/${{ github.repository_owner }}/data-platform/document-processor:sha-${SHORT_SHA}"
          cat > apps/document-processor/docker-compose.prod.yml <<EOF
          # Auto-generated by CI — do not edit manually
          # Overrides docker-compose.yml with the pinned GHCR image for production
          services:
            app:
              image: ${IMAGE}
              build: null
          EOF
        shell: bash

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/document-processor/docker-compose.prod.yml
          git diff --staged --quiet && exit 0
          git commit -m "ci(document-processor): pin image to sha-${{ needs.build-push.outputs.short-sha }}"
          # Rebase on top of any remote commits before pushing to avoid rejections
          git pull --rebase origin master
          git push

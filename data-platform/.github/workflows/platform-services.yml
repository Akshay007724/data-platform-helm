name: platform-services

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
    paths:
      - "services/data-ingestion/**"
      - "services/data-processor/**"
      - ".github/workflows/platform-services.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/data-ingestion/**"
      - "services/data-processor/**"
      - ".github/workflows/platform-services.yml"
  # Allow manual trigger to rebuild and re-pin without a code change
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (data-ingestion | data-processor | both)"
        required: true
        default: "both"

jobs:
  # ─── Determine which services changed ────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      data-ingestion: ${{ steps.filter.outputs.data-ingestion }}
      data-processor: ${{ steps.filter.outputs.data-processor }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            data-ingestion:
              - 'services/data-ingestion/**'
            data-processor:
              - 'services/data-processor/**'

  # ─── Build & push data-ingestion ─────────────────────────────────────────────
  build-data-ingestion:
    name: Build data-ingestion
    needs: changes
    if: |
      needs.changes.outputs.data-ingestion == 'true' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'data-ingestion' || github.event.inputs.service == 'both'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short-sha: ${{ steps.short-sha.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/data-platform/data-ingestion
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/data-ingestion
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build & push data-processor ─────────────────────────────────────────────
  build-data-processor:
    name: Build data-processor
    needs: changes
    if: |
      needs.changes.outputs.data-processor == 'true' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'data-processor' || github.event.inputs.service == 'both'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short-sha: ${{ steps.short-sha.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/data-platform/data-processor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/data-processor
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Write image tags back to values-images.yaml (GitOps trigger) ────────────
  update-image-tags:
    name: Update image tags (GitOps)
    needs: [build-data-ingestion, build-data-processor]
    # Run even if only one of the two build jobs ran (the other is skipped, not failed)
    if: |
      always() &&
      github.ref == 'refs/heads/master' &&
      (needs.build-data-ingestion.result == 'success' || needs.build-data-processor.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update data-ingestion tag
        if: needs.build-data-ingestion.result == 'success'
        run: |
          SHORT_SHA=${{ needs.build-data-ingestion.outputs.short-sha }}
          yq -i ".dataIngestion.image.repository = \"ghcr.io/${{ github.repository_owner }}/data-platform/data-ingestion\"" values-images.yaml
          yq -i ".dataIngestion.image.tag = \"sha-${SHORT_SHA}\"" values-images.yaml

      - name: Update data-processor tag
        if: needs.build-data-processor.result == 'success'
        run: |
          SHORT_SHA=${{ needs.build-data-processor.outputs.short-sha }}
          yq -i ".dataProcessor.image.repository = \"ghcr.io/${{ github.repository_owner }}/data-platform/data-processor\"" values-images.yaml
          yq -i ".dataProcessor.image.tag = \"sha-${SHORT_SHA}\"" values-images.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values-images.yaml
          git diff --staged --quiet || git commit -m "ci(platform): update service image tags [sha: $(echo ${{ github.sha }} | head -c 7)]"
          git push

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data
  namespace: document-processor
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: document-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.6.3
          ports:
            - containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          readinessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-data
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: document-processor
spec:
  selector:
    app: chromadb
  ports:
    - port: 8000
      targetPort: 8000

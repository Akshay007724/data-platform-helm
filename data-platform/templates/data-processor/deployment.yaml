{{- if .Values.dataProcessor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-platform.fullname" . }}-data-processor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-processor
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmaps/pipeline-config.yaml") . | sha256sum }}
spec:
  {{- if not .Values.dataProcessor.autoscaling.enabled }}
  replicas: {{ .Values.dataProcessor.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "data-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: data-processor
  template:
    metadata:
      labels:
        {{- include "data-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: data-processor
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps/pipeline-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "data-platform.serviceAccountName" . }}
      containers:
        - name: data-processor
          image: "{{ .Values.dataProcessor.image.repository }}:{{ .Values.dataProcessor.image.tag }}"
          imagePullPolicy: {{ .Values.dataProcessor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dataProcessor.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "data-platform.fullname" . }}-pipeline-config
          {{- if .Values.kafka.enabled }}
          volumeMounts:
            - name: kafka-client-config
              mountPath: /etc/kafka
              readOnly: true
          {{- end }}
          {{- with .Values.dataProcessor.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.dataProcessor.resources | nindent 12 }}
      {{- if .Values.kafka.enabled }}
      volumes:
        - name: kafka-client-config
          configMap:
            name: {{ include "data-platform.fullname" . }}-kafka-client-config
      {{- end }}
      {{- with .Values.dataProcessor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataProcessor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dataProcessor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

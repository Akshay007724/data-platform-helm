services:

  # ─── FastAPI Application ───────────────────────────────────────────────────
  app:
    build: .
    container_name: profile-analyzer-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - VISION_MODEL=${VISION_MODEL:-minicpm-v}
      - TEXT_MODEL=${TEXT_MODEL:-glm4}
      - LINKEDIN_LI_AT_COOKIE=${LINKEDIN_LI_AT_COOKIE:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ─── Ollama Local LLM Server ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: profile-analyzer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment below to enable GPU (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ─── Model Puller (runs once, then exits) ─────────────────────────────────
  # Pulls the vision model and text model into the shared ollama_data volume.
  # Skips download if the model is already cached.
  model-init:
    image: ollama/ollama:latest
    container_name: profile-analyzer-model-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo '>>> Waiting for Ollama...';
        until curl -sf http://ollama:11434/api/tags; do sleep 3; done;
        echo '>>> Pulling vision model (minicpm-v)...';
        ollama pull ${VISION_MODEL:-minicpm-v};
        echo '>>> Pulling text model (glm4)...';
        ollama pull ${TEXT_MODEL:-glm4};
        echo '>>> Models ready.';
      "
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  app_uploads:
  ollama_data:

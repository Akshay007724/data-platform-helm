apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: document-processor
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: data-platform
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        name: flux-bot
        email: flux-bot@users.noreply.github.com
      messageTemplate: "ci(flux): update document-processor image to {{range .Updated.Images}}{{.}}{{end}}"
    push:
      branch: master
  update:
    strategy: Setters   # uses the # {"$imagepolicy": ...} marker in app.yaml
    path: ./data-platform/apps/document-processor/k8s

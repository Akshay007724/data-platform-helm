apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: document-processor
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: document-processor
  # Selects the alphabetically newest sha-* tag (e.g. sha-abc1234)
  # Switch to SemVer when using version tags (v1.2.3)
  policy:
    alphabetical:
      order: asc
  filterTags:
    pattern: "^sha-[a-f0-9]+"

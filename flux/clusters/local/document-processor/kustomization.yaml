apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: document-processor
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: data-platform
  path: ./data-platform/apps/document-processor/k8s
  prune: true          # delete resources removed from git
  wait: true           # wait for all resources to be ready before reporting success
  timeout: 10m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: app
      namespace: document-processor
    - apiVersion: apps/v1
      kind: Deployment
      name: chromadb
      namespace: document-processor
    - apiVersion: apps/v1
      kind: Deployment
      name: ollama
      namespace: document-processor

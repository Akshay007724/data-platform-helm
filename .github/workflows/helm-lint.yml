name: helm-lint

on:
  pull_request:
    branches: [master]
    paths:
      - "data-platform/Chart.yaml"
      - "data-platform/Chart.lock"
      - "data-platform/values.yaml"
      - "data-platform/values-images.yaml"
      - "data-platform/templates/**"
      - ".github/workflows/helm-lint.yml"
  push:
    branches: [master]
    paths:
      - "data-platform/Chart.yaml"
      - "data-platform/Chart.lock"
      - "data-platform/values.yaml"
      - "data-platform/values-images.yaml"
      - "data-platform/templates/**"

defaults:
  run:
    working-directory: data-platform

jobs:
  lint:
    name: Helm lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.3"

      - name: Add Helm repositories
        run: |
          helm repo add bitnami   https://charts.bitnami.com/bitnami
          helm repo add airflow   https://airflow.apache.org
          helm repo update

      - name: Update chart dependencies
        run: helm dependency update .

      - name: Lint chart (strict)
        run: helm lint . --values values.yaml --strict

      - name: Lint chart with image overrides
        run: helm lint . --values values.yaml --values values-images.yaml --strict

      - name: Render templates (smoke test)
        run: |
          helm template data-platform . \
            --values values.yaml \
            --values values-images.yaml \
            --namespace data-platform \
            > /dev/null
          echo "Template rendering succeeded"

      - name: Validate rendered manifests with kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin/
          helm template data-platform . \
            --values values.yaml \
            --values values-images.yaml \
            --namespace data-platform \
            | kubeval --ignore-missing-schemas --kubernetes-version 1.31.0
